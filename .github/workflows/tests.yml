name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: i686-pc-windows-msvc

          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
            sudo apt-get update
            sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install 32-bit dependencies (Linux)
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-multilib

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test
        run: cargo test -vv --target ${{ matrix.target }}

      - name: Test Release
        run: cargo test -vv --release --target ${{ matrix.target }}

      - name: Build GUI Release
        run: cargo build -vv --release --bin Fb2CleanGui --no-default-features --features gui --target ${{ matrix.target }}
