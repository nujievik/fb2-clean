name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        default: 'v1.2.3'

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-builds:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: Windows-x64
          - target: i686-pc-windows-msvc
            arch: Windows-x32

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo -vv build --release --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo -vv build --release --bin Fb2CleanGui --no-default-features --features gui --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: fb2-clean-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/fb2-clean.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Fb2CleanGui-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/Fb2CleanGui.exe

  macos-builds:
    runs-on: macos-latest

    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: macOS-x64
          - target: aarch64-apple-darwin
            arch: macOS-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo -vv build --release --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo -vv build --release --bin Fb2CleanGui --no-default-features --features gui --target ${{ matrix.target }}

      - name: Make dmg
        run: |
          chmod +x make_macos_app_and_dmg.zsh
          ./make_macos_app_and_dmg.zsh target/${{ matrix.target }}/release/Fb2CleanGui

      - uses: actions/upload-artifact@v4
        with:
          name: fb2-clean-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/fb2-clean

      - uses: actions/upload-artifact@v4
        with:
          name: Fb2CleanGui-${{ matrix.arch }}
          path: Fb2CleanGui.dmg

  linux-builds:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: Linux-x64
          - target: i686-unknown-linux-gnu
            arch: Linux-x32

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install 32-bit dependencies
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-multilib

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo -vv build --release --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo -vv build --release --bin Fb2CleanGui --no-default-features --features gui --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: fb2-clean-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/fb2-clean

      - uses: actions/upload-artifact@v4
        with:
          name: Fb2CleanGui-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/Fb2CleanGui

  linux-arm64-build:
    runs-on: ubuntu-latest
    env:
      CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      TARGET: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install Rust target
        run: rustup target add ${{ env.TARGET }}

      - name: Build
        run: cargo -vv build --release --target ${{ env.TARGET }}

      - name: Build GUI
        run: cargo -vv build --release --bin Fb2CleanGui --no-default-features --features gui --target ${{ env.TARGET }}

      - uses: actions/upload-artifact@v4
        with:
          name: fb2-clean-Linux-arm64
          path: target/${{ env.TARGET }}/release/fb2-clean

      - uses: actions/upload-artifact@v4
        with:
          name: Fb2CleanGui-Linux-arm64
          path: target/${{ env.TARGET }}/release/Fb2CleanGui
          
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [windows-builds, macos-builds, linux-builds, linux-arm64-build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: fb2-clean-*
          path: artifacts
          merge-multiple: false

      - uses: actions/download-artifact@v4
        with:
          pattern: Fb2CleanGui-*
          path: artifacts
          merge-multiple: false

      - name: Archive each artifact
        run: |
          mkdir release
          for dir in artifacts/*; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../../release/${name}.zip" .)
          done

      - name: Set tag name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
